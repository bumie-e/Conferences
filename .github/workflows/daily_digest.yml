name: Daily Conference Digest

on:
  # Primary trigger: chain off the keepalive workflow so both use the same
  # "heartbeat" commit to keep the scheduler active.
  workflow_run:
    workflows: ["Keep Actions Alive"]
    types: [completed]

  # Fallback: direct cron in case keepalive is skipped
  schedule:
    - cron: "0 8 * * *"   # 08:00 UTC daily

  # Always allow manual trigger from the Actions tab
  workflow_dispatch:

jobs:
  send-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run conference bot
        env:
          GMAIL_ADDRESS:      ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL:    ${{ secrets.RECIPIENT_EMAIL }}
        run: python conference_bot.py
